rgba(161,223,241,.35);border-radius:10px;background:#070f1aa3;color:#e6f7ff;font-size:13px}.stats-panel span{white-space:nowrap}.weapon-switch{width:100%;display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:6px}.weapon-slot{border:1px solid rgba(149,203,224,.34);border-radius:10px;background:#081321a8;padding:6px 7px;display:flex;align-items:center;gap:6px;color:#8fb5ca;transition:border-color .1s linear,background .1s linear,color .1s linear}.weapon-slot.active{border-color:#92f3d2eb;background:#0e2324d1;color:#d8fff1}.weapon-key{min-width:18px;height:18px;border-radius:6px;border:1px solid rgba(178,226,247,.45);display:inline-grid;place-items:center;font-size:11px;background:#09121bcc;color:#d4f3ff}.weapon-slot.active .weapon-key{border-color:#92f3d2bf;color:#cbffe8}.weapon-name{letter-spacing:.03em;font-size:12px}.skill-indicator{width:100%;border:1px solid rgba(150,228,255,.35);border-radius:10px;background:#06121eb8;padding:8px 12px;display:grid;grid-template-columns:auto 1fr;grid-template-rows:auto auto;column-gap:10px;row-gap:6px;align-items:center}.skill-icon{grid-row:1 / span 2;font-size:20px;line-height:1}.skill-content{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:#d9f4ff}.skill-label{letter-spacing:.04em}.skill-cooldown-text{color:#8ef0c4}.skill-bar-track{grid-column:2;height:8px;border-radius:999px;overflow:hidden;background:#ffffff24}.skill-bar-fill{height:100%;width:100%;background:linear-gradient(90deg,#76d7ff,#98ffd4);transition:width 80ms linear}.debug-controls{width:100%;border:1px solid rgba(255,205,138,.45);border-radius:10px;background:#18100899;padding:10px 12px;display:grid;gap:8px}.debug-controls[hidden]{display:none!important}.debug-title{color:#ffdca7;font-weight:700;font-size:13px;letter-spacing:.04em}.debug-toggle{display:inline-flex;align-items:center;gap:8px;font-size:12px;color:#ffe5bf}.debug-toggle input{accent-color:#ffd493}.debug-buttons{display:flex;flex-wrap:wrap;gap:8px}.debug-buttons button{border:1px solid rgba(255,206,142,.45);background:#352210e6;color:#ffe5bf;border-radius:6px;padding:6px 10px;font:inherit;cursor:pointer}.debug-buttons button:hover{background:#4e341af2}.debug-director{display:flex;flex-wrap:wrap;gap:10px 14px;font-size:12px;color:#ffe4bf}.debug-log-block{border-top:1px solid rgba(255,206,142,.35);padding-top:8px}.debug-subtitle{font-size:12px;color:#ffd6a2;margin-bottom:4px}.debug-log{margin:0;padding-left:18px;max-height:110px;overflow-y:auto;font-size:12px;color:#ffe7c4}canvas{width:100%;aspect-ratio:16 / 9;display:block;border-radius:8px;background:#0f1720}.hint{margin:0;color:var(--muted);font-size:13px}@media(max-width:740px){.stats-panel{grid-template-columns:repeat(2,minmax(0,1fr));font-size:12px}.pickup-legend-header,.pickup-legend-row{grid-template-columns:1fr;gap:4px}}@keyframes settle{0%{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

</head>
<body>
  <div class="shell">
    <div id="hp-hud" class="hud-track top-hud" aria-label="Player health">
      <div id="hp-fill" class="hud-fill hp-fill"></div>
    </div>
    <div class="frame">
      <canvas id="game" width="1280" height="720"></canvas>
    </div>
    <div id="xp-hud" class="hud-track bottom-hud" aria-label="Player experience">
      <div id="xp-fill" class="hud-fill xp-fill"></div>
    </div>
    <div id="stats-panel" class="stats-panel" aria-live="polite">
      <span id="stat-hp">HP: 0 / 0</span>
      <span id="stat-lvl">LVL: 1</span>
      <span id="stat-ammo">Ammo: 0/0</span>
      <span id="stat-perks">Perks: 0</span>
      <span id="stat-enemies">Enemies: 0</span>
      <span id="stat-time">Time: 0.0s</span>
      <span id="stat-fps">FPS: 0</span>
    </div>
    <div id="weapon-switch" class="weapon-switch" aria-live="polite">
      <div id="weapon-slot-melee" class="weapon-slot">
        <span class="weapon-key">1</span>
        <span class="weapon-name">⚔️ Sword</span>
      </div>
      <div id="weapon-slot-gun" class="weapon-slot active">
        <span class="weapon-key">2</span>
        <span class="weapon-name">🔫 Gun</span>
      </div>
      <div id="weapon-slot-bow" class="weapon-slot">
        <span class="weapon-key">3</span>
        <span class="weapon-name">🏹 Bow</span>
      </div>
      <div id="weapon-slot-flail" class="weapon-slot">
        <span class="weapon-key">4</span>
        <span class="weapon-name">⛓️ Flail</span>
      </div>
    </div>
    <div id="skill-indicator" class="skill-indicator" aria-live="polite">
      <span class="skill-icon" aria-hidden="true">💨</span>
      <div class="skill-content">
        <span class="skill-label">Blink (Q)</span>
        <span id="skill-cooldown-text" class="skill-cooldown-text">Ready</span>
      </div>
      <div class="skill-bar-track">
        <div id="skill-bar-fill" class="skill-bar-fill"></div>
      </div>
    </div>
    <div id="shout-indicator" class="skill-indicator" aria-live="polite">
      <span class="skill-icon" aria-hidden="true">🗣️</span>
      <div class="skill-content">
        <span class="skill-label">Shout (E)</span>
        <span id="shout-cooldown-text" class="skill-cooldown-text">Ready</span>
      </div>
      <div class="skill-bar-track">
        <div id="shout-bar-fill" class="skill-bar-fill"></div>
      </div>
    </div>
    <div id="fireball-indicator" class="skill-indicator" aria-live="polite">
      <span class="skill-icon" aria-hidden="true">🔥</span>
      <div class="skill-content">
        <span class="skill-label">Fireball (F)</span>
        <span id="fireball-cooldown-text" class="skill-cooldown-text">Ready</span>
      </div>
      <div class="skill-bar-track">
        <div id="fireball-bar-fill" class="skill-bar-fill"></div>
      </div>
    </div>
    <div id="debug-controls" class="debug-controls" hidden>
      <div class="debug-title">Debug Enemy Spawner</div>
      <label class="debug-toggle" for="debug-director-toggle">
        <input id="debug-director-toggle" type="checkbox" />
        Director auto spawning
      </label>
      <label class="debug-toggle" for="debug-no-cooldowns-toggle">
        <input id="debug-no-cooldowns-toggle" type="checkbox" />
        No Cooldowns
      </label>
      <div class="debug-buttons">
        <button type="button" data-enemy-type="chaser">Spawn Chaser</button>
        <button type="button" data-enemy-type="slime">Spawn Slime</button>
        <button type="button" data-enemy-type="shooter">Spawn Shooter</button>
        <button type="button" data-enemy-type="assaultShooter">Spawn Assault Shooter</button>
        <button type="button" data-enemy-type="shotgunShooter">Spawn Shotgun Shooter</button>
        <button type="button" data-enemy-type="bomber">Spawn Bomber</button>
        <button type="button" data-enemy-type="mortar">Spawn Mortar</button>
        <button type="button" data-enemy-type="flyingBomber">Spawn Flying Bomber</button>
      </div>
      <div class="debug-buttons">
        <button id="debug-level-up" type="button">Level Up Player</button>
        <button id="debug-spawn-pickups" type="button">Spawn Pickups</button>
      </div>
    </div>
  </div>

  // src/systems/indicatorSystem.js
  function spawnIndicator(list, indicator) {
    list.push({
      elapsed: 0,
      color: "red",
      ...indicator
    });
  }
  function updateIndicators(list, dt) {
    const triggered = [];
    for (let index = list.length - 1; index >= 0; index -= 1) {
      const indicator = list[index];
      indicator.elapsed += dt;
      if (indicator.elapsed >= indicator.duration) {
        triggered.push(indicator);
        list.splice(index, 1);
      }
    }
    return triggered;
  }

  function spawnFloatingText2(gameState2, text, x, y, color, size = 24, kind = "damage") {
    gameState2.floatingTexts.push({

  function moveEnemyWithTerrain(enemy, dir, speed, dt, world, moveDirection = 1) {
    const treeSlow = getMovementSlowMultiplier(world, enemy.x, enemy.y, enemy.radius);
    const finalSpeed = speed * moveDirection * treeSlow;
    const nextX = enemy.x + dir.x * finalSpeed * dt;
    const nextY = enemy.y + dir.y * finalSpeed * dt;
    const resolved = resolvePositionAgainstMountains(world, nextX, nextY, enemy.radius);
    enemy.x = resolved.x;
    enemy.y = resolved.y;
  }
  function normalize(dx, dy) {
    const length = Math.hypot(dx, dy) || 1;
    return { x: dx / length, y: dy / length };
  }
  function pickShooterAimPoint(originX, originY, player, playerVelocity, projectileSpeed) {
    const predictiveChance = GAME_CONFIG.enemies.ai.predictiveAimChance;
    if (Math.random() >= predictiveChance) {
      return { x: player.x, y: player.y };
    }
    const distance = Math.hypot(player.x - originX, player.y - originY);
    const travelTime = distance / Math.max(1, projectileSpeed);
    return {
      x: player.x + playerVelocity.x * travelTime,
      y: player.y + playerVelocity.y * travelTime
    };
  }

  // src/systems/enemies/flyingBomber.js
  var FLY_CONFIG = GAME_CONFIG.enemies.archetypes.flyingBomber;
  function computeFlyingBomberPath(player, playerVelocity) {
    const halfW = CANVAS.width * 0.5;
    const halfH = CANVAS.height * 0.5;
    const margin = 200;
    const usePredicted = Math.random() < 0.5;
    const lookAheadTime = 1.2;
    const targetX = usePredicted ? player.x + playerVelocity.x * lookAheadTime : player.x;
    const targetY = usePredicted ? player.y + playerVelocity.y * lookAheadTime : player.y;
    const edge = Math.floor(Math.random() * 4);
    let fromX, fromY;
    if (edge === 0) {
      fromX = player.x - halfW - margin;
      fromY = targetY + (Math.random() * 2 - 1) * halfH * 0.6;
    } else if (edge === 1) {
      fromX = player.x + halfW + margin;
      fromY = targetY + (Math.random() * 2 - 1) * halfH * 0.6;
    } else if (edge === 2) {
      fromX = targetX + (Math.random() * 2 - 1) * halfW * 0.6;
      fromY = player.y - halfH - margin;
    } else {
      fromX = targetX + (Math.random() * 2 - 1) * halfW * 0.6;
      fromY = player.y + halfH + margin;
    }
    const dxRaw = targetX - fromX;
    const dyRaw = targetY - fromY;
    const lenRaw = Math.hypot(dxRaw, dyRaw) || 1;
    const dirX = dxRaw / lenRaw;
    const dirY = dyRaw / lenRaw;
    const diagonal = Math.hypot(CANVAS.width, CANVAS.height);
    const totalLen = lenRaw + diagonal + margin;
    const exitX = fromX + dirX * totalLen;
    const exitY = fromY + dirY * totalLen;
    return { fromX, fromY, dirX, dirY, exitX, exitY };
  }
  function updateFlyingBomberBehavior(gameState2, enemy, player, dt) {
    if (enemy.flyPhase === "warning") {
      enemy.warningTimer -= dt;
      if (enemy.warningTimer <= 0) {
        enemy.flyPhase = "flying";
        enemy.distTraveled = 0;
        enemy.bombDistAccum = FLY_CONFIG.bombInterval * 0.5;
      }
      return;
    }
    if (enemy.flyPhase === "flying") {
      const step = FLY_CONFIG.flySpeed * dt;
      enemy.x += enemy.flyDirX * step;
      enemy.y += enemy.flyDirY * step;
      enemy.distTraveled = (enemy.distTraveled || 0) + step;
      enemy.bombDistAccum = (enemy.bombDistAccum || 0) + step;
      while (enemy.bombDistAccum >= FLY_CONFIG.bombInterval) {
        enemy.bombDistAccum -= FLY_CONFIG.bombInterval;
        dropBomb(gameState2, enemy, player);
      }
      const halfW = CANVAS.width * 0.5;
      const halfH = CANVAS.height * 0.5;
      const offX = enemy.x < player.x - halfW - 120 || enemy.x > player.x + halfW + 120;
      const offY = enemy.y < player.y - halfH - 120 || enemy.y > player.y + halfH + 120;
      const fromLen = Math.hypot(enemy.flyExitX - enemy.flyFromX, enemy.flyExitY - enemy.flyFromY);
      if ((offX || offY) && enemy.distTraveled >= fromLen * 0.4) {
        enemy.isDone = true;
      }
    }
  }
  function dropBomb(gameState2, enemy, player) {
    const bx = enemy.x;
    const by = enemy.y;
    const radius = FLY_CONFIG.bombRadius;
    const damage = FLY_CONFIG.bombDamage;
    spawnIndicator(gameState2.indicators, {
      type: "circle",
      position: { x: bx, y: by },
      size: { radius },
      duration: FLY_CONFIG.bombTelegraphDuration,
      source: "flyingBomber",
      onTrigger() {
        const dist = Math.hypot(player.x - bx, player.y - by);
        if (dist <= radius) {
          player.hp -= damage;
          spawnFloatingText2(gameState2, `-${damage}`, player.x, player.y - player.radius - 8, "255,142,150", 22, "damage");
          gameState2.screenFx.shake = Math.min(14, gameState2.screenFx.shake + 2.1);
          gameState2.screenFx.damageFlash = Math.min(1, gameState2.screenFx.damageFlash + 0.18);
        }
        gameState2.effects.push(
          { x: bx, y: by, radius: 14, elapsed: 0, duration: 0.32, growth: 30, color: "255, 90, 120" },
          { x: bx, y: by, radius: radius * 0.55, elapsed: 0, duration: 0.52, growth: 11, color: "255, 185, 100" }
        );
      }
    });
  }

    updateFloatingTexts(gameState, dt);
    updateSlashEffects(gameState, dt);
    updateEffects(gameState, dt);
    applyPendingLevelUps(gameState, services.events);
    if (gameState.player.perkPoints > 0 && !gameState.player.perkModalOpen && !gameState.paused && gameState.player.perkChoices.length === 0) {
      openPerkModal({ refreshChoices: gameState.player.perkChoices.length === 0 });
      return;
    }
    if (gameState.player.hp <= 0) {
      recordRunResult();
      gameState.gameOver = true;
      gameState.gameOverElapsed = 0;
      gameState.running = false;
      gameState.paused = true;
    }
  }
  createLoop(
    update,
    () => {
      renderer.render();
      hud.update(services, fpsTracker.getValue());
    }
  );
})();

  </script>
</body>
</html>
